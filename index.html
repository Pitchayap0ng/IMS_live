<!DOCTYPE html>
<html lang="th">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
        <title>CleanFlow</title>

        <script src="https://cdn.tailwindcss.com"></script>
        <script>
        // สำคัญ: ตั้งค่าให้ Tailwind รองรับ Dark Mode ผ่าน Class
        tailwind.config = { darkMode: 'class' }
    </script>

        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

        <script
            src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
        <script
            src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

        <link rel="stylesheet" href="style.css">
    </head>
    <body
        class="antialiased transition-colors duration-300 font-['Anuphan'] bg-white dark:bg-black text-slate-900 dark:text-white">

        <main class="max-w-md mx-auto min-h-screen pb-36">
            <header class="p-6 flex justify-between items-center">
                <h1
                    class="text-2xl font-black uppercase tracking-tighter">Clean<span
                        class="text-indigo-600">Flow</span></h1>
                <button onclick="toggleDarkMode()"
                    class="w-10 h-10 rounded-2xl bg-slate-100 dark:bg-zinc-800 flex items-center justify-center transition-all active:scale-90">
                    <i id="darkIcon"
                        class="fa-solid fa-moon text-slate-600 dark:text-yellow-400 text-xl"></i>
                </button>
            </header>

            <div class="px-6 mb-8">
                <div
                    class="bg-indigo-600 p-8 rounded-[35px] text-white shadow-xl relative overflow-hidden">
                    <p
                        class="text-xs font-bold opacity-60 uppercase">ยอดเงินคงเหลือ</p>
                    <h2 class="text-4xl font-black">฿ <span
                            id="mainBalance">0.00</span></h2>
                    <i
                        class="fa-solid fa-wallet absolute -right-4 -bottom-4 text-7xl opacity-10"></i>
                </div>
            </div>

            <section id="page-add" class="page active px-6 space-y-4">
                <div
                    class="flex gap-2 p-1.5 bg-slate-100 dark:bg-zinc-900 rounded-2xl">
                    <button id="btnExp" onclick="setType('expense')"
                        class="flex-1 py-4 rounded-xl font-bold text-sm bg-white dark:bg-zinc-800 shadow-sm transition-all">รายจ่าย</button>
                    <button id="btnInc" onclick="setType('income')"
                        class="flex-1 py-4 rounded-xl font-bold text-sm opacity-40 transition-all text-slate-400">รายรับ</button>
                </div>

                <input id="amountInput" type="number" inputmode="decimal"
                    placeholder="0.00"
                    class="w-full p-6 text-3xl font-black bg-slate-50 dark:bg-zinc-900 rounded-[25px] border-none outline-none text-slate-800 dark:text-white text-center focus:ring-2 ring-indigo-500/20">

                <div class="grid grid-cols-2 gap-3">
                    <select id="categorySelect"
                        class="p-4 bg-slate-50 dark:bg-zinc-800 rounded-2xl font-bold text-sm outline-none border border-transparent dark:border-zinc-700 dark:text-white"></select>
                    <input id="noteInput" type="text" placeholder="บันทึก..."
                        class="p-4 bg-slate-50 dark:bg-zinc-800 rounded-2xl text-sm outline-none border border-transparent dark:border-zinc-700 dark:text-white">
                </div>

                <input type="hidden" id="editId">
                <button onclick="saveTransaction()"
                    class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black shadow-lg active:scale-95 transition-all">บันทึกข้อมูล</button>
            </section>

            <section id="page-daily" class="page px-6">
                <h2
                    class="text-xs font-black opacity-40 uppercase mb-4 tracking-widest dark:text-slate-500">ประวัติรายการ</h2>
                <div id="dailyList" class="space-y-3"></div>
            </section>

            <section id="page-stats" class="page px-6 space-y-6">
                <div class="flex justify-between items-center">
                    <h2
                        class="text-xs font-black opacity-40 uppercase tracking-widest dark:text-slate-500">สถิติการใช้จ่าย</h2>
                    <input type="month" id="monthPicker"
                        onchange="renderStats()"
                        class="bg-transparent font-bold text-indigo-500 border-none outline-none">
                </div>

                <div
                    class="bg-white dark:bg-zinc-900 p-6 rounded-[35px] border border-slate-50 dark:border-zinc-800 shadow-sm">
                    <canvas id="statsChart" style="max-height: 200px;"></canvas>
                </div>

                <div id="statsSummary" class="grid grid-cols-2 gap-3"></div>

                <div>
                    <h3
                        class="text-[10px] font-black opacity-30 uppercase mb-3 tracking-widest dark:text-slate-500">รายละเอียดเดือนนี้</h3>
                    <div id="statsList" class="space-y-2"></div>
                </div>
            </section>
        </main>

        <nav
            class="fixed bottom-8 left-6 right-6 bg-[#1e293b] dark:bg-zinc-900 rounded-full p-2 flex justify-around items-center z-50 shadow-2xl border border-white/5">
            <button onclick="showPage('page-add', this)"
                class="text-white p-4 transition-all"><i
                    class="fa-solid fa-plus text-lg"></i></button>
            <button onclick="showPage('page-daily', this)"
                class="text-white p-4 opacity-50 transition-all"><i
                    class="fa-solid fa-list text-lg"></i></button>
            <button onclick="showPage('page-stats', this)"
                class="text-white p-4 opacity-50 transition-all"><i
                    class="fa-solid fa-chart-pie text-lg"></i></button>
        </nav>

        <script src="app.js"></script>
    </body>
</html>
